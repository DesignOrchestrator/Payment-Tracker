<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baseline vs CB Comparison</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 20px; background:#f4f6f9;}
table { border-collapse: collapse; width: 100%; margin-top: 20px; background:white;}
th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
th { background: #111; color: white; }
button { padding:8px 12px; margin-top:10px; margin-right:10px; cursor:pointer; }
.summary { margin-top: 20px; font-size: 18px; font-weight:bold;}
.chart-container { width: 400px; display:inline-block; margin:20px;}
.insight { margin-top:20px; background:white; padding:15px; }
.small { font-size:12px; color:gray; margin-top:5px;}
</style>
</head>

<body>

<h2>Baseline vs CB Comparison</h2>

<input type="file" id="upload" accept=".xlsx" />
<button onclick="exportExcel()">Export to Excel</button>
<button onclick="clearData()">Clear Saved Data</button>

<div class="small" id="lastUpdated"></div>

<table id="comparisonTable">
<thead>
<tr>
<th>Bank</th>
<th>Baseline Remaining</th>
<th>CB Outstanding</th>
<th>Difference</th>
<th>Latest Month Shortfall</th>
<th>Cumulative Shortfall</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="summary">
<p>Total Baseline Remaining: <span id="totalBaseline">0</span></p>
<p>Total CB: <span id="totalCB">0</span></p>
<p>Total Difference: <span id="totalDiff">0</span></p>
</div>

<div>
<div class="chart-container">
<canvas id="totalChart"></canvas>
</div>

<div class="chart-container">
<canvas id="diffChart"></canvas>
</div>

<div class="chart-container" style="width:800px;">
<canvas id="shortfallChart"></canvas>
</div>
</div>

<div class="insight" id="insightBox"></div>

<script>

const required = {
"AMEX":162,
"Citibank":384,
"DBS":176,
"HSBC":101,
"SCB":266.35,
"Trust":106,
"UOB":197.68
};

let comparisonRows = [];
let totalBaseline = 0;
let totalCB = 0;
let totalDiff = 0;

let totalChartInstance = null;
let diffChartInstance = null;
let shortfallChartInstance = null;

document.getElementById('upload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    const data = new Uint8Array(event.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    localStorage.setItem("cbData", JSON.stringify(json));
    localStorage.setItem("lastUpdated", new Date().toLocaleString());

    generateComparison(json);
  };

  reader.readAsArrayBuffer(file);
});

function generateComparison(cbData) {

  const payments = JSON.parse(localStorage.getItem("payments")) || [];
  const baseline = JSON.parse(localStorage.getItem("baseline")) || {};

  const months = [...new Set(payments.map(p=>p.monthRef))].sort();
  const latestMonth = months[months.length - 1];

  const tbody = document.querySelector("#comparisonTable tbody");
  tbody.innerHTML = "";

  comparisonRows = [];
  totalBaseline = 0;
  totalCB = 0;
  totalDiff = 0;

  cbData.forEach(row => {

    const bank = row.Banks;
    const cbOutstanding = parseFloat(row["CB Outstanding"]);

    const base = baseline[bank] || 0;

    const paidTotal = payments
      .filter(p=>p.bank===bank)
      .reduce((s,p)=>s+p.amount,0);

    const remain = Math.max(0, base - paidTotal);

    // Latest month shortfall
    const latestPaid = payments
      .filter(p=>p.bank===bank && p.monthRef===latestMonth)
      .reduce((s,p)=>s+p.amount,0);

    const latestShortfall = latestPaid - required[bank];

    // Cumulative shortfall
    const cumulativeShortfall = payments
      .filter(p=>p.bank===bank)
      .reduce((sum,p)=>{
        return sum + (p.amount - required[bank]);
      },0);

    const diff = cbOutstanding - remain;

    totalBaseline += remain;
    totalCB += cbOutstanding;
    totalDiff += diff;

    comparisonRows.push([
      bank, remain, cbOutstanding, diff,
      latestShortfall, cumulativeShortfall
    ]);

    let diffText = "";
    let diffStyle = "";

    if (diff > 0) {
      diffText = `+${diff.toFixed(2)} (CB More)`;
      diffStyle = "color:red;font-weight:bold;";
    } else if (diff < 0) {
      diffText = `${diff.toFixed(2)} (CB Less)`;
      diffStyle = "color:green;font-weight:bold;";
    } else {
      diffText = "0.00 (Match)";
      diffStyle = "color:gray;font-weight:bold;";
    }

    tbody.innerHTML += `
    <tr>
      <td>${bank}</td>
      <td>${remain.toFixed(2)}</td>
      <td>${cbOutstanding.toFixed(2)}</td>
      <td style="${diffStyle}">${diffText}</td>
      <td>${latestShortfall.toFixed(2)}</td>
      <td>${cumulativeShortfall.toFixed(2)}</td>
    </tr>
    `;
  });

  document.getElementById("totalBaseline").innerText = totalBaseline.toFixed(2);
  document.getElementById("totalCB").innerText = totalCB.toFixed(2);
  document.getElementById("totalDiff").innerText = totalDiff.toFixed(2);

  document.getElementById("lastUpdated").innerText =
    "Last Updated: " + localStorage.getItem("lastUpdated");

  renderCharts();
  renderInsights(latestMonth);
}

function renderCharts() {

  if (totalChartInstance) totalChartInstance.destroy();
  if (diffChartInstance) diffChartInstance.destroy();
  if (shortfallChartInstance) shortfallChartInstance.destroy();

  totalChartInstance = new Chart(document.getElementById("totalChart"), {
    type: 'doughnut',
    data: {
      labels: ["Baseline Remaining", "CB Total"],
      datasets: [{ data: [totalBaseline, totalCB] }]
    }
  });

  diffChartInstance = new Chart(document.getElementById("diffChart"), {
    type: 'doughnut',
    data: {
      labels: comparisonRows.map(r=>r[0]),
      datasets: [{ data: comparisonRows.map(r=>Math.abs(r[3])) }]
    }
  });

  shortfallChartInstance = new Chart(document.getElementById("shortfallChart"), {
    type: 'bar',
    data: {
      labels: comparisonRows.map(r=>r[0]),
      datasets: [
        { label:"Latest Shortfall", data: comparisonRows.map(r=>r[4]) },
        { label:"Cumulative Shortfall", data: comparisonRows.map(r=>r[5]) },
        { label:"CB Difference", data: comparisonRows.map(r=>r[3]) }
      ]
    }
  });
}

function renderInsights(latestMonth){
  document.getElementById("insightBox").innerHTML = `
  <h3>Insights</h3>
  <p>Latest Month Analysed: <strong>${latestMonth}</strong></p>
  <p>Total CB is ${totalDiff.toFixed(2)} different from tracker remaining.</p>
  `;
}

function exportExcel(){
  const ws_data = [
    ["Bank","Remaining","CB","Difference","Latest Shortfall","Cumulative Shortfall"],
    ...comparisonRows
  ];
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Comparison");
  XLSX.writeFile(wb, "Baseline_vs_CB_Comparison.xlsx");
}

function clearData(){
  localStorage.removeItem("cbData");
  localStorage.removeItem("lastUpdated");
  location.reload();
}

window.onload = function(){
  const savedData = localStorage.getItem("cbData");
  if(savedData){
    generateComparison(JSON.parse(savedData));
  }
};

</script>
</body>
</html>
