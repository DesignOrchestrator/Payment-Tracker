<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Personal Financial Statement</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

.header{
background:#111;
color:white;
padding:20px 40px;
}

.container{
padding:30px;
max-width:1400px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card h3{
margin:0;
font-size:13px;
color:#555;
}

.big{
font-size:26px;
font-weight:bold;
margin-top:6px;
}

.positive{color:#16a34a;}
.negative{color:#dc2626;}

.flex{
display:flex;
gap:25px;
align-items:flex-start;
}

.left{flex:1}
.right{flex:1}

.section{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
}

th{
text-align:left;
font-size:13px;
color:#666;
}

input{
padding:6px;
width:90%;
}

button{
padding:6px 12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{opacity:0.9}

.chartBox{
height:300px;
margin-top:10px;
}

.topButtons{
text-align:right;
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="header">
<h2>Personal Financial Statement</h2>
</div>

<div class="container">

<div class="topButtons">
<button onclick="exportBackup()">Export Backup</button>
<button onclick="importBackup()">Import Backup</button>
<input type="file" id="importFile" style="display:none" accept=".json">
</div>

<div class="grid">

<div class="card">
<h3>Total Income</h3>
<div id="incomeTotal" class="big">0</div>
</div>

<div class="card">
<h3>Total Expenses</h3>
<div id="expenseTotal" class="big">0</div>
</div>

<div class="card">
<h3>Assets</h3>
<div id="assetTotal" class="big">0</div>
</div>

<div class="card">
<h3>Liabilities</h3>
<div id="liabilityTotal" class="big">0</div>
</div>

<div class="card">
<h3>Net Worth</h3>
<div id="netWorth" class="big">0</div>
</div>

</div>

<div class="flex">

<div class="left">

<div class="section">

<h3>Assets</h3>

<input id="assetName" placeholder="Asset name">
<input id="assetValue" type="number" placeholder="Amount">
<button onclick="addAsset()">Add</button>

<table>
<thead>
<tr>
<th>Asset</th>
<th>Value</th>
<th></th>
</tr>
</thead>

<tbody id="assetTable"></tbody>

</table>

</div>


<div class="section">

<h3>Additional Liabilities</h3>

<input id="liabName" placeholder="Liability name">
<input id="liabValue" type="number" placeholder="Amount">
<button onclick="addLiability()">Add</button>

<table>

<thead>
<tr>
<th>Liability</th>
<th>Amount</th>
<th></th>
</tr>
</thead>

<tbody id="liabTable"></tbody>

</table>

</div>

</div>


<div class="right">

<div class="section">

<h3>Income vs Expenses</h3>

<div class="chartBox">
<canvas id="cashChart"></canvas>
</div>

</div>

<div class="section">

<h3>Net Worth Composition</h3>

<div class="chartBox">
<canvas id="netChart"></canvas>
</div>

</div>

</div>

</div>

</div>


<script>

let assets=JSON.parse(localStorage.getItem("fsAssets"))||[];
let liabilities=JSON.parse(localStorage.getItem("fsLiabilities"))||[];

function save(){

localStorage.setItem("fsAssets",JSON.stringify(assets));
localStorage.setItem("fsLiabilities",JSON.stringify(liabilities));

}

function getIncome(){

let incomes=JSON.parse(localStorage.getItem("simpleBudgetIncome"))||[];

return incomes.reduce((s,i)=>s+i.a,0);

}

function getExpenses(){

let expenses=JSON.parse(localStorage.getItem("simpleBudgetExpenses"))||[];

return expenses.reduce((s,e)=>s+e.a,0);

}

function getDebt(){

let payments=JSON.parse(localStorage.getItem("payments"))||[];
let baseline=JSON.parse(localStorage.getItem("baseline"))||{};

let total=0;

Object.keys(baseline).forEach(bank=>{

let base=baseline[bank];

let paid=payments.filter(p=>p.bank===bank)
.reduce((s,p)=>s+p.amount,0);

total+=Math.max(0,base-paid);

});

return total;

}

function render(){

let assetBody=document.getElementById("assetTable");
let liabBody=document.getElementById("liabTable");

assetBody.innerHTML="";
liabBody.innerHTML="";

let assetTotal=0;

assets.forEach((a,i)=>{

assetTotal+=a.v;

assetBody.innerHTML+=`
<tr>
<td>${a.n}</td>
<td>${a.v}</td>
<td><button onclick="deleteAsset(${i})">X</button></td>
</tr>
`;

});

let extraLiab=0;

liabilities.forEach((l,i)=>{

extraLiab+=l.v;

liabBody.innerHTML+=`
<tr>
<td>${l.n}</td>
<td>${l.v}</td>
<td><button onclick="deleteLiability(${i})">X</button></td>
</tr>
`;

});

let debt=getDebt();

let income=getIncome();
let expenses=getExpenses();

let totalLiab=debt+extraLiab;

let netWorth=assetTotal-totalLiab;

document.getElementById("incomeTotal").innerText=income.toFixed(2);
document.getElementById("expenseTotal").innerText=expenses.toFixed(2);
document.getElementById("assetTotal").innerText=assetTotal.toFixed(2);
document.getElementById("liabilityTotal").innerText=totalLiab.toFixed(2);

let nw=document.getElementById("netWorth");

nw.innerText=netWorth.toFixed(2);
nw.className="big "+(netWorth>=0?"positive":"negative");

drawCharts(income,expenses,assetTotal,totalLiab);

}

function addAsset(){

let n=document.getElementById("assetName").value;
let v=parseFloat(document.getElementById("assetValue").value);

if(!n||!v)return;

assets.push({n,v});

save();
render();

}

function addLiability(){

let n=document.getElementById("liabName").value;
let v=parseFloat(document.getElementById("liabValue").value);

if(!n||!v)return;

liabilities.push({n,v});

save();
render();

}

function deleteAsset(i){

assets.splice(i,1);
save();
render();

}

function deleteLiability(i){

liabilities.splice(i,1);
save();
render();

}

let cashChart,netChart;

function drawCharts(income,expenses,assets,liab){

if(cashChart) cashChart.destroy();

cashChart=new Chart(document.getElementById("cashChart"),{

type:'bar',

data:{
labels:["Income","Expenses"],
datasets:[{data:[income,expenses]}]
},

options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}}
}

});

if(netChart) netChart.destroy();

netChart=new Chart(document.getElementById("netChart"),{

type:'doughnut',

data:{
labels:["Assets","Liabilities"],
datasets:[{data:[assets,liab]}]
},

options:{
responsive:true,
maintainAspectRatio:false,
cutout:'65%'
}

});

}

function exportBackup(){

const data={
assets,
liabilities
};

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download="financial-statement-backup.json";
a.click();

}

function importBackup(){

document.getElementById("importFile").click();

}

document.getElementById("importFile").addEventListener("change",function(e){

let file=e.target.files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(evt){

let data=JSON.parse(evt.target.result);

assets=data.assets||[];
liabilities=data.liabilities||[];

save();
render();

};

reader.readAsText(file);

});

render();

</script>

</body>
</html>
