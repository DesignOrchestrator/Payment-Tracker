<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Financial Statement</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
.container { max-width:1200px; margin:auto; padding:20px; }
.topbar { display:flex; justify-content:space-between; align-items:center; }
.card {
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-top:15px;
}
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
td { padding:6px; border-bottom:1px solid #f0f0f0; }
input { width:95%; padding:4px; }
button { padding:4px 8px; cursor:pointer; margin-top:4px; }
.positive { color:#28a745; font-weight:bold; }
.negative { color:#dc3545; font-weight:bold; }
.chart-wrap { margin-top:15px; }
.section-title { margin-top:10px; font-weight:bold; }
</style>
</head>

<body>
<div class="container">

<div class="topbar">
<h2>Financial Statement</h2>
<select id="monthSelect" onchange="render()"></select>
</div>

<div class="grid">

<!-- CASHFLOW -->
<div class="card">
<h3>Cashflow</h3>

<div class="section-title">Required DMP (Editable)</div>
<input type="number" id="requiredInput" onchange="saveRequiredOverride()">

<hr>

<table>
<tr><td>Recurring Income</td><td id="recIncome"></td></tr>
<tr><td>Total Income</td><td id="totalIncome"></td></tr>
<tr><td>Living Expenses</td><td id="expenses"></td></tr>
<tr><td>Pre-Debt Surplus</td><td id="preDebt"></td></tr>
<tr><td>Required DMP</td><td id="required"></td></tr>
<tr><td>Actual Paid</td><td id="actual"></td></tr>
<tr><td>Variance</td><td id="variance"></td></tr>
<tr><td><b>True Cashflow</b></td><td id="trueCashflow"></td></tr>
</table>

<div class="chart-wrap">
<canvas id="incomeRing"></canvas>
</div>

</div>

<!-- BALANCE -->
<div class="card">
<h3>Balance Sheet</h3>

<div class="section-title">Add Asset</div>
<input id="assetName" placeholder="Asset Name">
<input type="number" id="assetValue" placeholder="Amount">
<button onclick="addAsset()">Add Asset</button>

<table id="assetTable"></table>

<div class="section-title">Add Liability</div>
<input id="liabName" placeholder="Liability Name">
<input type="number" id="liabValue" placeholder="Amount">
<button onclick="addLiability()">Add Liability</button>

<table id="manualLiabTable"></table>

<div class="section-title">Auto Liabilities (Payment Tracker)</div>
<table id="autoLiabTable"></table>

<hr>

<table>
<tr><td>Total Assets</td><td id="assets"></td></tr>
<tr><td>Total Liabilities</td><td id="liabilities"></td></tr>
<tr><td><b>Net Worth</b></td><td id="netWorth"></td></tr>
</table>

<div class="chart-wrap">
<canvas id="balanceRing"></canvas>
</div>

</div>

</div>

<script>

// ===== DEFAULT DMP BASELINE =====
const requiredDMP = {
AMEX:162, Citibank:384, DBS:176,
HSBC:101, SCB:266.35, Trust:106, UOB:200
};

let requiredOverride = JSON.parse(localStorage.getItem("requiredOverride")) || {};
let manualAssets = JSON.parse(localStorage.getItem("manualAssets")) || [];
let manualLiab = JSON.parse(localStorage.getItem("manualLiab")) || {};

function populateMonths(){
let payments = JSON.parse(localStorage.getItem("payments")) || [];
let months=[...new Set(payments.map(p=>p.monthRef))].sort();
let select=document.getElementById("monthSelect");
select.innerHTML="";
months.forEach(m=> select.innerHTML+=`<option value="${m}">${m}</option>`);
}

function saveRequiredOverride(){
let month=document.getElementById("monthSelect").value;
requiredOverride[month]=parseFloat(document.getElementById("requiredInput").value)||0;
localStorage.setItem("requiredOverride",JSON.stringify(requiredOverride));
render();
}

function getRequired(month){
if(requiredOverride[month]!==undefined) return requiredOverride[month];
return Object.values(requiredDMP).reduce((s,v)=>s+v,0);
}

function getActual(month){
let payments=JSON.parse(localStorage.getItem("payments"))||[];
return payments.filter(p=>p.monthRef===month)
.reduce((s,p)=>s+p.amount,0);
}

function getExpenses(){
let data=JSON.parse(localStorage.getItem("budgetExpenses"))||[];
return data.reduce((s,e)=> s+parseFloat(e.amount||0),0);
}

function getRecurringIncome(){
let data=JSON.parse(localStorage.getItem("budgetIncome"))||[];
return data.reduce((s,i)=> s+parseFloat(i.amount||0),0);
}

function getAutoLiabilities(){
let baseline=JSON.parse(localStorage.getItem("baseline"))||{};
let payments=JSON.parse(localStorage.getItem("payments"))||[];
let result=[];
Object.keys(baseline).forEach(bank=>{
let paid=payments.filter(p=>p.bank===bank)
.reduce((s,p)=>s+p.amount,0);
let remain=Math.max(0,baseline[bank]-paid);
if(remain>0) result.push({bank,remain});
});
return result;
}

function addAsset(){
let n=document.getElementById("assetName").value;
let v=parseFloat(document.getElementById("assetValue").value);
if(!n||!v)return;
manualAssets.push({name:n,value:v});
localStorage.setItem("manualAssets",JSON.stringify(manualAssets));
render();
}

function addLiability(){
let n=document.getElementById("liabName").value;
let v=parseFloat(document.getElementById("liabValue").value);
if(!n||!v)return;
manualLiab.push({name:n,value:v});
localStorage.setItem("manualLiab",JSON.stringify(manualLiab));
render();
}

let incomeChart=null;
let balanceChart=null;

function render(){

let month=document.getElementById("monthSelect").value;

let recurring=getRecurringIncome();
let living=getExpenses();
let totalIncome=recurring;
let required=getRequired(month);
let actual=getActual(month);

document.getElementById("requiredInput").value=required;

let preDebt=totalIncome-living;
let variance=actual-required;
let trueCF=totalIncome-living-actual;

document.getElementById("recIncome").innerText=recurring.toFixed(2);
document.getElementById("totalIncome").innerText=totalIncome.toFixed(2);
document.getElementById("expenses").innerText=living.toFixed(2);
document.getElementById("preDebt").innerText=preDebt.toFixed(2);
document.getElementById("required").innerText=required.toFixed(2);
document.getElementById("actual").innerText=actual.toFixed(2);
document.getElementById("variance").innerText=variance.toFixed(2);
document.getElementById("trueCashflow").innerText=trueCF.toFixed(2);

// ===== BALANCE =====
let auto=getAutoLiabilities();
let autoTotal=auto.reduce((s,x)=>s+x.remain,0);
let manualTotal=manualLiab.reduce((s,x)=>s+x.value,0);
let assetTotal=manualAssets.reduce((s,x)=>s+x.value,0);
let totalLiab=autoTotal+manualTotal;

document.getElementById("assets").innerText=assetTotal.toFixed(2);
document.getElementById("liabilities").innerText=totalLiab.toFixed(2);
document.getElementById("netWorth").innerText=(assetTotal-totalLiab).toFixed(2);

document.getElementById("assetTable").innerHTML=
manualAssets.map(a=>`<tr><td>${a.name}</td><td>${a.value}</td></tr>`).join("");

document.getElementById("manualLiabTable").innerHTML=
manualLiab.map(l=>`<tr><td>${l.name}</td><td>${l.value}</td></tr>`).join("");

document.getElementById("autoLiabTable").innerHTML=
auto.map(a=>`<tr><td>${a.bank}</td><td>${a.remain.toFixed(2)}</td></tr>`).join("");

// CHARTS
if(incomeChart) incomeChart.destroy();
incomeChart=new Chart(document.getElementById("incomeRing"),{
type:'doughnut',
data:{
labels:["Expenses","DMP","Remaining"],
datasets:[{data:[living,actual,Math.max(0,totalIncome-living-actual)]}]
}
});

if(balanceChart) balanceChart.destroy();
balanceChart=new Chart(document.getElementById("balanceRing"),{
type:'doughnut',
data:{
labels:["Assets","Liabilities"],
datasets:[{data:[assetTotal,totalLiab]}]
}
});

}

populateMonths();
render();

</script>
</body>
</html>
