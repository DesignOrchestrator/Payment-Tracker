<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Financial Statement</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
.container { max-width:1200px; margin:auto; padding:20px; }
.topbar { display:flex; justify-content:space-between; align-items:center; }
.card {
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-top:15px;
}
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
td { padding:6px; border-bottom:1px solid #eee; }
input { width:95%; padding:4px; }
button { padding:4px 8px; cursor:pointer; margin:2px; }
.positive { color:#28a745; font-weight:bold; }
.negative { color:#dc3545; font-weight:bold; }
.section-title { margin-top:12px; font-weight:bold; }
.chart-wrap { margin-top:15px; }
</style>
</head>

<body>
<div class="container">

<div class="topbar">
<h2>Financial Statement</h2>
<select id="monthSelect" onchange="render()"></select>
</div>

<div class="grid">

<!-- CASHFLOW -->
<div class="card">
<h3>Cashflow</h3>

<div class="section-title">Required DMP (Editable)</div>
<input type="number" id="requiredInput" onchange="saveRequired()">

<div class="section-title">One-Time Income</div>
<input id="incomeName" placeholder="Name">
<input type="number" id="incomeAmount" placeholder="Amount">
<button onclick="addIncome()">Add</button>
<table id="incomeTable"></table>

<div class="section-title">One-Time Expense</div>
<input id="expenseName" placeholder="Name">
<input type="number" id="expenseAmount" placeholder="Amount">
<button onclick="addExpense()">Add</button>
<table id="expenseTable"></table>

<hr>

<table>
<tr><td>Total Income</td><td id="totalIncome"></td></tr>
<tr><td>Total Expenses</td><td id="totalExpenses"></td></tr>
<tr><td>Required DMP</td><td id="required"></td></tr>
<tr><td>Actual Paid</td><td id="actual"></td></tr>
<tr><td>True Cashflow</td><td id="trueCF"></td></tr>
</table>

<div class="chart-wrap">
<canvas id="incomeRing"></canvas>
</div>

</div>

<!-- BALANCE -->
<div class="card">
<h3>Balance Sheet</h3>

<div class="section-title">Assets</div>
<input id="assetName" placeholder="Name">
<input type="number" id="assetAmount" placeholder="Amount">
<button onclick="addAsset()">Add</button>
<table id="assetTable"></table>

<div class="section-title">Manual Liabilities</div>
<input id="liabName" placeholder="Name">
<input type="number" id="liabAmount" placeholder="Amount">
<button onclick="addLiab()">Add</button>
<table id="manualLiabTable"></table>

<div class="section-title">Auto Liabilities (Payment Tracker)</div>
<table id="autoLiabTable"></table>

<hr>

<table>
<tr><td>Total Assets</td><td id="totalAssets"></td></tr>
<tr><td>Total Liabilities</td><td id="totalLiab"></td></tr>
<tr><td><b>Net Worth</b></td><td id="netWorth"></td></tr>
</table>

<div class="chart-wrap">
<canvas id="balanceRing"></canvas>
</div>

</div>

</div>

<script>

// STORAGE
let requiredOverride = JSON.parse(localStorage.getItem("requiredOverride")) || {};
let oneIncome = JSON.parse(localStorage.getItem("oneIncome")) || {};
let oneExpense = JSON.parse(localStorage.getItem("oneExpense")) || {};
let assets = JSON.parse(localStorage.getItem("assets")) || [];
let manualLiab = JSON.parse(localStorage.getItem("manualLiab")) || {};

function saveAll(){
localStorage.setItem("requiredOverride",JSON.stringify(requiredOverride));
localStorage.setItem("oneIncome",JSON.stringify(oneIncome));
localStorage.setItem("oneExpense",JSON.stringify(oneExpense));
localStorage.setItem("assets",JSON.stringify(assets));
localStorage.setItem("manualLiab",JSON.stringify(manualLiab));
}

function populateMonths(){
let payments = JSON.parse(localStorage.getItem("payments")) || [];
let months=[...new Set(payments.map(p=>p.monthRef))].sort();
let select=document.getElementById("monthSelect");
select.innerHTML="";
months.forEach(m=> select.innerHTML+=`<option value="${m}">${m}</option>`);
}

function getActual(month){
let payments=JSON.parse(localStorage.getItem("payments"))||[];
return payments.filter(p=>p.monthRef===month)
.reduce((s,p)=>s+p.amount,0);
}

function getAutoLiab(){
let baseline=JSON.parse(localStorage.getItem("baseline"))||{};
let payments=JSON.parse(localStorage.getItem("payments"))||[];
let result=[];
Object.keys(baseline).forEach(bank=>{
let paid=payments.filter(p=>p.bank===bank)
.reduce((s,p)=>s+p.amount,0);
let remain=Math.max(0,baseline[bank]-paid);
if(remain>0) result.push({bank,remain});
});
return result;
}

// ADD / DELETE FUNCTIONS
function addIncome(){
let month=monthSelect.value;
if(!oneIncome[month]) oneIncome[month]=[];
oneIncome[month].push({
name:incomeName.value,
amount:parseFloat(incomeAmount.value)||0
});
incomeName.value="";
incomeAmount.value="";
saveAll(); render();
}

function deleteIncome(i){
oneIncome[monthSelect.value].splice(i,1);
saveAll(); render();
}

function addExpense(){
let month=monthSelect.value;
if(!oneExpense[month]) oneExpense[month]=[];
oneExpense[month].push({
name:expenseName.value,
amount:parseFloat(expenseAmount.value)||0
});
expenseName.value="";
expenseAmount.value="";
saveAll(); render();
}

function deleteExpense(i){
oneExpense[monthSelect.value].splice(i,1);
saveAll(); render();
}

function addAsset(){
assets.push({
name:assetName.value,
amount:parseFloat(assetAmount.value)||0
});
assetName.value="";
assetAmount.value="";
saveAll(); render();
}

function deleteAsset(i){
assets.splice(i,1);
saveAll(); render();
}

function addLiab(){
manualLiab.push({
name:liabName.value,
amount:parseFloat(liabAmount.value)||0
});
liabName.value="";
liabAmount.value="";
saveAll(); render();
}

function deleteLiab(i){
manualLiab.splice(i,1);
saveAll(); render();
}

function saveRequired(){
requiredOverride[monthSelect.value]=parseFloat(requiredInput.value)||0;
saveAll(); render();
}

let incomeChart, balanceChart;

function render(){

let month=monthSelect.value;

// Required
let required=requiredOverride[month]||0;
requiredInput.value=required;

// Income
let incomeList=oneIncome[month]||[];
let totalIncome=incomeList.reduce((s,x)=>s+x.amount,0);

// Expense
let expenseList=oneExpense[month]||[];
let totalExpense=expenseList.reduce((s,x)=>s+x.amount,0);

let actual=getActual(month);
let trueCF=totalIncome-totalExpense-actual;

// Render tables
incomeTable.innerHTML=incomeList.map((x,i)=>
`<tr><td>${x.name}</td><td>${x.amount}</td>
<td><button onclick="deleteIncome(${i})">X</button></td></tr>`).join("");

expenseTable.innerHTML=expenseList.map((x,i)=>
`<tr><td>${x.name}</td><td>${x.amount}</td>
<td><button onclick="deleteExpense(${i})">X</button></td></tr>`).join("");

assetTable.innerHTML=assets.map((x,i)=>
`<tr><td>${x.name}</td><td>${x.amount}</td>
<td><button onclick="deleteAsset(${i})">X</button></td></tr>`).join("");

manualLiabTable.innerHTML=manualLiab.map((x,i)=>
`<tr><td>${x.name}</td><td>${x.amount}</td>
<td><button onclick="deleteLiab(${i})">X</button></td></tr>`).join("");

let auto=getAutoLiab();
autoLiabTable.innerHTML=auto.map(a=>
`<tr><td>${a.bank}</td><td>${a.remain.toFixed(2)}</td></tr>`).join("");

let autoTotal=auto.reduce((s,x)=>s+x.remain,0);
let manualTotal=manualLiab.reduce((s,x)=>s+x.amount,0);
let assetTotal=assets.reduce((s,x)=>s+x.amount,0);
let totalLiab=autoTotal+manualTotal;

// Display totals
totalIncomeEl= document.getElementById("totalIncome");
totalExpensesEl= document.getElementById("totalExpenses");
totalIncomeEl.innerText=totalIncome.toFixed(2);
totalExpensesEl.innerText=totalExpense.toFixed(2);
requiredEl= document.getElementById("required");
requiredEl.innerText=required.toFixed(2);
actualEl= document.getElementById("actual");
actualEl.innerText=actual.toFixed(2);
trueCFEl= document.getElementById("trueCF");
trueCFEl.innerText=trueCF.toFixed(2);

totalAssets.innerText=assetTotal.toFixed(2);
totalLiabEl=document.getElementById("totalLiab");
totalLiabEl.innerText=totalLiab.toFixed(2);
netWorth.innerText=(assetTotal-totalLiab).toFixed(2);

// Charts
if(incomeChart) incomeChart.destroy();
incomeChart=new Chart(incomeRing,{
type:'doughnut',
data:{labels:["Expenses","DMP","Remaining"],
datasets:[{data:[totalExpense,actual,Math.max(0,totalIncome-totalExpense-actual)]}]}
});

if(balanceChart) balanceChart.destroy();
balanceChart=new Chart(balanceRing,{
type:'doughnut',
data:{labels:["Assets","Liabilities"],
datasets:[{data:[assetTotal,totalLiab]}]}
});

}

populateMonths();
render();

</script>
</body>
</html>
