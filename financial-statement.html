<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Personal Financial Statement</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

.header{
background:#111;
color:white;
padding:20px 40px;
}

.container{
padding:30px 40px;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card h3{
margin:0;
font-size:14px;
color:#666;
}

.big{
font-size:26px;
font-weight:bold;
margin-top:8px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-bottom:25px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#222;
color:white;
}

.positive{color:#16a34a;}
.negative{color:#dc2626;}

button{
padding:8px 14px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h2>Personal Financial Statement</h2>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Total Income</h3>
<div id="incomeTotal" class="big">0</div>
</div>

<div class="card">
<h3>Total Expenses</h3>
<div id="expenseTotal" class="big">0</div>
</div>

<div class="card">
<h3>Monthly Net</h3>
<div id="monthlyNet" class="big">0</div>
</div>

<div class="card">
<h3>Total Liabilities</h3>
<div id="liabilityTotal" class="big">0</div>
</div>

<div class="card">
<h3>Net Worth</h3>
<div id="netWorth" class="big">0</div>
</div>

</div>


<h3>Income Sources (Auto from Budget)</h3>

<table id="incomeTable">
<tr>
<th>Source</th>
<th>Amount</th>
</tr>
</table>


<h3>Expenses (Auto from Budget)</h3>

<table id="expenseTable">
<tr>
<th>Category</th>
<th>Amount</th>
</tr>
</table>


<h3>Liabilities (Auto from Payment Tracker)</h3>

<table id="debtTable">
<tr>
<th>Bank</th>
<th>Remaining</th>
</tr>
</table>

<button onclick="calculate()">Refresh Financial Statement</button>

</div>

<script>

function getBudgetIncome(){

return JSON.parse(localStorage.getItem("simpleBudgetIncome")) || [];

}

function getBudgetExpenses(){

return JSON.parse(localStorage.getItem("simpleBudgetExpenses")) || [];

}

function getRemainingDebt(){

let payments=JSON.parse(localStorage.getItem("payments"))||[];
let baseline=JSON.parse(localStorage.getItem("baseline"))||{};

let debts={};

Object.keys(baseline).forEach(bank=>{

let base=baseline[bank];

let paid=payments
.filter(p=>p.bank===bank)
.reduce((s,p)=>s+p.amount,0);

let remaining=Math.max(0,base-paid);

debts[bank]=remaining;

});

return debts;

}

function renderIncome(){

let incomes=getBudgetIncome();

let table=document.getElementById("incomeTable");

let html="<tr><th>Source</th><th>Amount</th></tr>";

let total=0;

incomes.forEach(i=>{

html+=`
<tr>
<td>${i.s}</td>
<td>${i.a.toFixed(2)}</td>
</tr>
`;

total+=i.a;

});

table.innerHTML=html;

return total;

}

function renderExpenses(){

let expenses=getBudgetExpenses();

let table=document.getElementById("expenseTable");

let html="<tr><th>Category</th><th>Amount</th></tr>";

let total=0;

expenses.forEach(e=>{

html+=`
<tr>
<td>${e.c}</td>
<td>${e.a.toFixed(2)}</td>
</tr>
`;

total+=e.a;

});

table.innerHTML=html;

return total;

}

function renderDebts(){

let debts=getRemainingDebt();

let table=document.getElementById("debtTable");

let html="<tr><th>Bank</th><th>Remaining</th></tr>";

let total=0;

Object.keys(debts).forEach(bank=>{

html+=`
<tr>
<td>${bank}</td>
<td>${debts[bank].toFixed(2)}</td>
</tr>
`;

total+=debts[bank];

});

html+=`
<tr style="font-weight:bold">
<td>Total</td>
<td>${total.toFixed(2)}</td>
</tr>
`;

table.innerHTML=html;

return total;

}

function calculate(){

let income=renderIncome();
let expenses=renderExpenses();
let liabilities=renderDebts();

let monthlyNet=income-expenses;
let netWorth=0-liabilities;

document.getElementById("incomeTotal").innerText=income.toFixed(2);
document.getElementById("expenseTotal").innerText=expenses.toFixed(2);

let m=document.getElementById("monthlyNet");

m.innerText=monthlyNet.toFixed(2);
m.className="big "+(monthlyNet>=0?"positive":"negative");

document.getElementById("liabilityTotal").innerText=liabilities.toFixed(2);

let nw=document.getElementById("netWorth");

nw.innerText=netWorth.toFixed(2);
nw.className="big "+(netWorth>=0?"positive":"negative");

}

calculate();

</script>

</body>
</html>
