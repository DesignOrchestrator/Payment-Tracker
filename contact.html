<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bank Contact Command Center</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #eef2f7, #f9fbff);
  margin: 0;
  padding: 25px;
  color: #222;
}

h2 {
  margin-bottom: 4px;
  font-weight: 600;
  font-size: 20px;
}

.small {
  font-size: 11px;
  color: #777;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.card {
  background: white;
  padding: 14px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  font-size: 12px;
}

.card-header {
  font-weight: 600;
  margin-bottom: 6px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.contact-item {
  margin-bottom: 4px;
}

button {
  padding: 3px 7px;
  border-radius: 5px;
  border: none;
  background: #111;
  color: white;
  cursor: pointer;
  font-size: 11px;
}

button:hover {
  background: #333;
}

input, textarea {
  width: 100%;
  padding: 4px 6px;
  border-radius: 5px;
  border: 1px solid #ddd;
  font-size: 11px;
  margin-top: 4px;
}

textarea {
  resize: vertical;
}

a {
  text-decoration: none;
  color: #0066cc;
  font-size: 11px;
}

a:hover {
  text-decoration: underline;
}

/* Responsive for mobile */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2>🏦 Bank & CCS Contact Center</h2>
<div class="small">Compact View • Stored locally in browser</div>

<div class="grid" id="cardContainer"></div>

<script>

const institutions = [
"AMEX","Citibank","DBS","HSBC","SCB","Trust","UOB","CCS"
];

const defaultContacts = {
"SCB":[{type:"Phone",value:"18007477000"}],
"Citibank":[{type:"Phone",value:"62255225"}],
"DBS":[{type:"Phone",value:"62276864"}],
"UOB":[
  {type:"Phone",value:"18003882121"},
  {type:"Email",value:"Customer.Service@UOBgroup.com"}
],
"HSBC":[{type:"Phone",value:"66585955"}],
"AMEX":[{type:"Phone",value:"68801515"}],
"Trust":[],
"CCS":[
  {type:"Phone",value:"62555227"},
  {type:"Website",value:"https://www.ccs.org.sg"}
]
};

let contacts = JSON.parse(localStorage.getItem("bankContacts")) || defaultContacts;
let notes = JSON.parse(localStorage.getItem("bankNotes")) || {};
let lastContacted = JSON.parse(localStorage.getItem("bankLastContacted")) || {};

function saveAll(){
  localStorage.setItem("bankContacts",JSON.stringify(contacts));
  localStorage.setItem("bankNotes",JSON.stringify(notes));
  localStorage.setItem("bankLastContacted",JSON.stringify(lastContacted));
}

function render(){
  const container = document.getElementById("cardContainer");
  container.innerHTML = "";

  institutions.forEach(name => {

    let contactHTML = "";

    (contacts[name] || []).forEach((c,index)=>{

      let icon = "📞";
      let link = "";

      if(c.type === "Email"){
        icon = "📧";
        link = `<a href="mailto:${c.value}">${c.value}</a>`;
      }
      else if(c.type === "Website"){
        icon = "🌐";
        link = `<a href="${c.value}" target="_blank">${c.value}</a>`;
      }
      else {
        link = `<a href="tel:${c.value}">${c.value}</a>`;
      }

      contactHTML += `
        <div class="contact-item">
          ${icon} ${link}
          <button onclick="deleteContact('${name}',${index})">x</button>
        </div>
      `;
    });

    container.innerHTML += `
      <div class="card">
        <div class="card-header">
          <span>${name}</span>
          <span>${(contacts[name]||[]).length} contact(s)</span>
        </div>

        ${contactHTML}

        <input placeholder="Phone / Email / URL" id="new_${name}">
        <button onclick="addContact('${name}')">Add</button>

        <textarea rows="2" placeholder="Notes..."
          onchange="saveNote('${name}',this.value)">${notes[name]||""}</textarea>

        <input type="date" value="${lastContacted[name]||""}"
          onchange="saveLast('${name}',this.value)">
      </div>
    `;
  });
}

function addContact(name){
  let val = document.getElementById("new_"+name).value.trim();
  if(!val) return;

  let type = "Phone";
  if(val.includes("@")) type="Email";
  if(val.startsWith("http")) type="Website";

  if(!contacts[name]) contacts[name] = [];
  contacts[name].push({type:type,value:val});

  saveAll();
  render();
}

function deleteContact(name,index){
  contacts[name].splice(index,1);
  saveAll();
  render();
}

function saveNote(name,value){
  notes[name] = value;
  saveAll();
}

function saveLast(name,value){
  lastContacted[name] = value;
  saveAll();
}

render();

</script>

</body>
</html>
