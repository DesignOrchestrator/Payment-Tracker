<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bank Contact Command Center</title>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f9;}
h2 { margin-bottom:20px; }
table { border-collapse: collapse; width:100%; background:white;}
th, td { border:1px solid #ddd; padding:8px; text-align:left;}
th { background:#111; color:white;}
button { padding:4px 8px; margin:2px; cursor:pointer;}
input, textarea { padding:4px; margin:2px; width:95%; }
.small { font-size:12px; color:gray;}
</style>
</head>

<body>

<h2>Bank Contact Command Center</h2>

<table id="contactTable">
<thead>
<tr>
<th>Bank</th>
<th>Contacts</th>
<th>Add Contact</th>
<th>Notes</th>
<th>Last Contacted</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const banks = ["AMEX","Citibank","DBS","HSBC","SCB","Trust","UOB"];

// Default contacts from your letters
const defaultContacts = {
"SCB":[{type:"Phone",value:"18007477000"}],
"Citibank":[{type:"Phone",value:"62255225"}],
"DBS":[{type:"Phone",value:"62276864"}],
"UOB":[
  {type:"Phone",value:"18003882121"},
  {type:"Email",value:"Customer.Service@UOBgroup.com"}
],
"HSBC":[{type:"Phone",value:"66585955"}],
"AMEX":[{type:"Phone",value:"68801515"}],
"Trust":[]
};

let contacts = JSON.parse(localStorage.getItem("bankContacts")) || defaultContacts;
let notes = JSON.parse(localStorage.getItem("bankNotes")) || {};
let lastContacted = JSON.parse(localStorage.getItem("bankLastContacted")) || {};

function saveAll(){
localStorage.setItem("bankContacts",JSON.stringify(contacts));
localStorage.setItem("bankNotes",JSON.stringify(notes));
localStorage.setItem("bankLastContacted",JSON.stringify(lastContacted));
}

function render(){

const tbody=document.querySelector("#contactTable tbody");
tbody.innerHTML="";

banks.forEach(bank=>{

let contactHTML="";

(contacts[bank]||[]).forEach((c,index)=>{
if(c.type==="Phone"){
contactHTML+=`📞 <a href="tel:${c.value}">${c.value}</a>
<button onclick="deleteContact('${bank}',${index})">x</button><br>`;
}else{
contactHTML+=`📧 <a href="mailto:${c.value}">${c.value}</a>
<button onclick="deleteContact('${bank}',${index})">x</button><br>`;
}
});

tbody.innerHTML+=`
<tr>
<td><b>${bank}</b></td>
<td>${contactHTML}</td>
<td>
<input placeholder="Phone or Email" id="new_${bank}">
<button onclick="addContact('${bank}')">Add</button>
</td>
<td>
<textarea rows="3" onchange="saveNote('${bank}',this.value)">
${notes[bank]||""}
</textarea>
</td>
<td>
<input type="date" value="${lastContacted[bank]||""}" 
onchange="saveLast('${bank}',this.value)">
</td>
</tr>
`;

});

}

function addContact(bank){
let val=document.getElementById("new_"+bank).value.trim();
if(!val)return;
let type=val.includes("@")?"Email":"Phone";
if(!contacts[bank])contacts[bank]=[];
contacts[bank].push({type,value:val});
saveAll();
render();
}

function deleteContact(bank,index){
contacts[bank].splice(index,1);
saveAll();
render();
}

function saveNote(bank,value){
notes[bank]=value;
saveAll();
}

function saveLast(bank,value){
lastContacted[bank]=value;
saveAll();
}

render();

</script>

</body>
</html>
